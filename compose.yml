services:
  api:
    container_name: node-app
    build:
      context: .
      target: development
    ports:
      - "8082:8082"
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
  postgres:
    image: postgres:17-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data:
